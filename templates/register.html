{% extends 'base.html' %}
{% block title %}Create Account — Lore & Co.{% endblock %}

{% block extra_css %}
<style>
  .auth-page {
    min-height: calc(100vh - 130px);
    display: flex; align-items: center; justify-content: center;
    background: var(--cream); padding: 3rem 2rem;
  }
  .auth-card { background: white; padding: 3rem; width: 100%; max-width: 420px; border: 1px solid var(--border); }
  .auth-logo {
    font-family: var(--font-serif);
    font-size: 1.4rem; font-weight: 300; letter-spacing: 0.1em;
    text-align: center; margin-bottom: 0.5rem; color: var(--ink);
  }
  .auth-subtitle { text-align: center; font-size: 0.85rem; color: var(--bark); margin-bottom: 2rem; }
  .auth-submit { width: 100%; padding: 0.9rem; margin-bottom: 1.5rem; }
  .auth-footer { text-align: center; font-size: 0.8rem; color: var(--bark); }
  .auth-footer a { color: var(--rust); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
  .password-hint { font-size: 0.75rem; color: var(--bark); margin-top: 0.3rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <p class="auth-logo">Lore & Co.</p>
    <p class="auth-subtitle">Create your account</p>
    <form method="post" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="8">
        <p class="password-hint">Minimum 8 characters</p>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
    </form>
    <p class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
