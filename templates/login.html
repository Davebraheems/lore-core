{% extends 'base.html' %}
{% block title %}Sign In — Lore & Co.{% endblock %}

{% block extra_css %}
<style>
  .auth-page {
    min-height: calc(100vh - 130px);
    display: flex; align-items: center; justify-content: center;
    background: var(--cream); padding: 3rem 2rem;
  }
  .auth-card { background: white; padding: 3rem; width: 100%; max-width: 420px; border: 1px solid var(--border); }
  .auth-logo {
    font-family: var(--font-serif);
    font-size: 1.4rem; font-weight: 300; letter-spacing: 0.1em;
    text-align: center; margin-bottom: 0.5rem; color: var(--ink);
  }
  .auth-subtitle {
    text-align: center; font-size: 0.85rem; color: var(--bark);
    margin-bottom: 2rem;
  }
  .auth-card h2 {
    font-family: var(--font-serif);
    font-size: 1.6rem; font-weight: 300; text-align: center;
    margin-bottom: 2rem; color: var(--ink);
  }
  .remember-row {
    display: flex; align-items: center; gap: 0.5rem;
    margin-bottom: 1.25rem;
  }
  .remember-row label { font-size: 0.8rem; color: var(--bark); margin: 0; }
  .auth-submit { width: 100%; padding: 0.9rem; margin-bottom: 1.5rem; }
  .auth-footer { text-align: center; font-size: 0.8rem; color: var(--bark); }
  .auth-footer a { color: var(--rust); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <p class="auth-logo">Lore & Co.</p>
    <p class="auth-subtitle">Welcome back</p>
    <form method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">Keep me signed in</label>
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
    </form>
    <p class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
